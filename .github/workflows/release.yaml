name: Publish Image and Release

on:
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: anthonydickson/budgeteur

jobs:
  get-version:
    name: Get Version
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    outputs:
      semver: ${{ steps.version.outputs.semver }}
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: 3.14

      - name: Read Version from Cargo.toml
        id: version
        run: |
          VERSION=$(python -c 'import tomllib; f = open("Cargo.toml", "rb"); print(tomllib.load(f)["workspace"]["package"]["version"])')
          echo "semver=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "${VERSION}"

                    
  enforce-unique-tag:
    name: Enforce Unique Image Tag
    runs-on: ubuntu-latest
    needs: get-version

    permissions:
      contents: read
      packages: write
      id-token: write

    outputs:
      skip: ${{ steps.tag-check.outputs.skip }}
      
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          # Fetch previous commit as well so we can check which files have changed.
          # This assumes you are squashing or merging with --no-ff into main
          fetch-depth: 2 

      - name: Log in to the Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if tag exists
        id: tag-check
        run: |
          echo "ℹ️ Checking tag is unique before building."

          exit_code=""
          RESULT=$(docker manifest inspect ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.get-version.outputs.semver }} 2>&1 || exit_code=$?)

          if [[ -n $exit_code && $RESULT != "manifest unknown" ]]; then
            echo "❗Error $exit_code: $RESULT"
            exit 1
          fi

          if [ "$RESULT" != "manifest unknown" ]; then
            echo "🚨 Tag already exists, update the version in Cargo.toml! 🚨"
            exit 1
          fi

          echo "✅ Tag is unique, proceeding with build"
          echo -n "skip=false" >> "$GITHUB_OUTPUT"

  build-docker:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs:
      - get-version
      - enforce-unique-tag
    if: ${{ success() && needs.enforce-unique-tag.outputs.skip == 'false' }}

    permissions:
      packages: write
      attestations: write
      id-token: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Log in to the Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Build and Push Docker Image
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.get-version.outputs.semver }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          labels: ${{ steps.meta.outputs.labels }}

      - name: Generate Artifact Attestation
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

  build-tui:
    name: Build TUI Binary
    runs-on: ubuntu-latest
    needs:
      - get-version
      - enforce-unique-tag
    if: ${{ success() && needs.enforce-unique-tag.outputs.skip == 'false' }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        run: rustup toolchain install 1.95.0 --profile minimal

      - name: Build TUI binary
        run: cargo +1.95.0 build --release -p budgeteur_tui

      - name: Rename binary for upload
        run: mv target/release/budgeteur_tui budgeteur-tui-linux-x86_64

      - name: Upload binary
        uses: actions/upload-artifact@v7
        with:
          name: budgeteur-tui-linux-x86_64
          path: budgeteur-tui-linux-x86_64

  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs:
      - get-version
      - enforce-unique-tag
      - build-docker
      - build-tui
    if: ${{ success() && needs.enforce-unique-tag.outputs.skip == 'false' }}

    permissions:
      contents: write

    steps:
      - name: Download TUI binary
        uses: actions/download-artifact@v8
        with:
          name: budgeteur-tui-linux-x86_64

      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create v${{ needs.get-version.outputs.semver }} \
            --generate-notes \
            budgeteur-tui-linux-x86_64

# TODO: Once stable (1.0.0), tag image twice, once with full semver and
# again with the major version. This will allow me to pin to a major version
# on my NAS and have it download updates with a single click.
